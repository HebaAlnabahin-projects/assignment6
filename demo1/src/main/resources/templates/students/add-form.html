<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Student Form</title>
</head>
<body>
<h2>Student Information</h2>

<form th:action="@{/students/save}" th:object="${student}" method="POST">

    <input type="hidden" th:field="*{id}" />

    <label>Student Name:</label>
    <input type="text" th:field="*{name}" required /><br/><br/>

    <label>Major:</label>
    <input type="text" th:field="*{major}" required /><br/><br/>

    <label>Grade:</label>
    <input type="number" step="1" th:field="*{grade}" required /><br/><br/>

    <button type="submit">Save Student</button>
    <a th:href="@{/students}">Cancel</a>
</form>
</body>
</html>
